  <text x="76" y="650" fill="#d9c58c" font-family="Georgia, 'Times New Roman', serif" font-size="20" letter-spacing="4">SEARCH</text>

  <text x="412" y="112" fill="#f2e8c8" font-family="Georgia, 'Times New Roman', serif" font-size="42" letter-spacing="2">Tarnished's Arsenal</text>
  <text x="412" y="148" fill="#9fb0c7" font-family="Segoe UI, Arial, sans-serif" font-size="18">War-room search for weapon, affinity, AoW, upgrade, and combat-stat paths.</text>

