<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 920" role="img" aria-labelledby="title desc">
  <title id="title">Tarnished's Arsenal war room overview</title>
  <desc id="desc">Stylized overview of the build optimizer interface with a left build rail, ranked result cards, and a comparison panel.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0c1017"/>
      <stop offset="100%" stop-color="#06080d"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#8f6a24"/>
      <stop offset="50%" stop-color="#d4b15a"/>
      <stop offset="100%" stop-color="#8f6a24"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#141b26"/>
      <stop offset="100%" stop-color="#0f151f"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#d4b15a" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1600" height="920" fill="url(#bg)"/>
  <rect x="24" y="24" width="1552" height="872" rx="22" fill="#0a0e15" stroke="#243043" stroke-width="2"/>

  <rect x="52" y="64" width="300" height="792" rx="18" fill="url(#panel)" stroke="#2c3a4c"/>
  <rect x="376" y="64" width="1172" height="160" rx="18" fill="#101722" stroke="#8f6a24" stroke-width="2" filter="url(#glow)"/>
  <rect x="376" y="248" width="1172" height="608" rx="18" fill="url(#panel)" stroke="#2c3a4c"/>

  <text x="76" y="104" fill="#d9c58c" font-family="Georgia, 'Times New Roman', serif" font-size="20" letter-spacing="4">BUILD</text>
