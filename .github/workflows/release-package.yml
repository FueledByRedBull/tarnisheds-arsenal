name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  package:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install packaging deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install maturin PyQt6

      - name: Build packaged release
        run: |
          python tools/phase4/package_release.py

      - name: Archive release bundle
        run: |
          $releaseDir = Get-ChildItem dist -Directory | Sort-Object LastWriteTime | Select-Object -Last 1
          if (-not $releaseDir) { throw "No release directory found in dist" }
          $zipPath = Join-Path "dist" "$($releaseDir.Name).zip"
          if (Test-Path $zipPath) { Remove-Item $zipPath -Force }
          Compress-Archive -Path "$($releaseDir.FullName)\*" -DestinationPath $zipPath
          "RELEASE_ZIP=$zipPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-dist
          path: |
            dist/

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: Tarnished's Arsenal ${{ github.ref_name }}
          generate_release_notes: true
          files: ${{ env.RELEASE_ZIP }}
